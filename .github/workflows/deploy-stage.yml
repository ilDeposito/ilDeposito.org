name: Deploy Stage

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-stage
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/sergej/websites/ildeposito/stage

    steps:
      - name: Pre-deploy health check
        run: |
          ./ildeposito.sh drush status --fields=drupal-version,db-status,bootstrap
          ./ildeposito.sh drush config:status 2>/dev/null \
            | grep -v 'No differences' \
            && echo '::warning::Config drift rilevato' || true

      - name: Backup database
        run: |
          mkdir -p backup/deploy
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ./ildeposito.sh drush sql:dump --result-file=/var/backup_migrate/deploy/pre-deploy-${TIMESTAMP}.sql
          ./ildeposito.sh exec -T php bzip2 /var/backup_migrate/deploy/pre-deploy-${TIMESTAMP}.sql
          # Retention a 10 file, a prescindere dall'età (non su base temporale).
          ls -1t backup/deploy/pre-deploy-*.sql.bz2 | tail -n +11 | xargs -r rm -f --

      - name: Pull latest code
        run: |
          # Drupal (status report) può aver indurito sites/default a 555:
          # git reset deve poter fare unlink dei file dentro la directory.
          # Difesa in profondità oltre a skip_permissions_hardening nei settings.
          chmod u+w backend/web/sites/default backend/web/sites/default/*.php backend/web/sites/default/*.yml 2>/dev/null || true
          OLD_HEAD=$(git rev-parse HEAD)
          git fetch origin main
          git reset --hard origin/main
          echo "OLD_HEAD=${OLD_HEAD}" >> "$GITHUB_ENV"
          {
            git describe --tags --always
            git log -1 --pretty=%s
          } > backend/.deploy-version

      - name: Update containers
        run: ./ildeposito.sh up

      - name: Wait for DB ready
        run: |
          for i in $(seq 1 10); do
            ./ildeposito.sh drush status --fields=db-status 2>/dev/null \
              | grep -q Connected && break
            echo "Waiting for DB... ($i/10)"; sleep 5
          done

      - name: Install Composer dependencies
        run: ./ildeposito.sh composer install --no-dev --optimize-autoloader

      - name: Run Drupal updates
        run: |
          ./ildeposito.sh drush sset system.maintenance_mode 1
          ./ildeposito.sh drush cache:rebuild
          ./ildeposito.sh drush updatedb -y || { ./ildeposito.sh drush sset system.maintenance_mode 0; ./ildeposito.sh drush cache:rebuild; exit 1; }
          ./ildeposito.sh drush config:import -y || { ./ildeposito.sh drush sset system.maintenance_mode 0; ./ildeposito.sh drush cache:rebuild; exit 1; }
          ./ildeposito.sh drush cache:rebuild
          ./ildeposito.sh drush sset system.maintenance_mode 0
          ./ildeposito.sh drush cache:rebuild

      - name: Rebuild Search API index
        run: |
          # config:import crea/aggiorna l'indice tracciando solo la prima
          # pagina di item (tracking_page_size=100): il totale resta monco e
          # il cron (50/ora) non recupera mai. Il rebuild ritraccia tutto e
          # forza il reindex completo; la ricerca continua a servire i dati
          # già indicizzati finché i nodi non vengono riprocessati.
          # Serve solo quando cambia la config dell'indice/server Search API
          # (nuovi campi, datasource, processor): senza modifiche lì il
          # tracking di config:import resta coerente e il rebuild è inutile.
          if git diff --name-only "${OLD_HEAD}" HEAD -- \
              backend/web/sites/default/config/sync/search_api.index.*.yml \
              backend/web/sites/default/config/sync/search_api.server.*.yml \
              | grep -q .; then
            echo "Config Search API modificata, rebuild indice..."
            ./ildeposito.sh drush search-api:rebuild-tracker ildeposito
            ./ildeposito.sh drush search-api:index ildeposito
          else
            echo "Nessuna modifica alla config Search API, skip rebuild indice."
          fi

      - name: Build frontend
        run: ./ildeposito.sh build-frontend

      # Smoke test disabilitato temporaneamente: stage.ildeposito.org è ora
      # dietro forward_auth Authelia, che non accetta l'Authorization Basic
      # di curl (redirect al portale di login) → falsi negativi. Riattivare
      # dopo aver adattato il check al flusso Authelia.
      # - name: Smoke test
      #   run: |
      #     # Poll invece di sleep fisso: esce al primo 200, fallisce dopo ~30s.
      #     for i in $(seq 1 10); do
      #       STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
      #         -u "${{ secrets.STAGE_AUTH_USER }}:${{ secrets.STAGE_AUTH_PASS }}" \
      #         https://stage.ildeposito.org/)
      #       echo "HTTP status: $STATUS (tentativo $i/10)"
      #       [ "$STATUS" = "200" ] && exit 0
      #       sleep 3
      #     done
      #     exit 1

      - name: E2E tests (Playwright)
        env:
          STAGE_AUTH_USER: ${{ secrets.STAGE_AUTH_USER }}
          STAGE_AUTH_PASS: ${{ secrets.STAGE_AUTH_PASS }}
        working-directory: /home/ubuntu/sergej/websites/ildeposito/stage/frontend
        run: |
          # npm ci cancella e reinstalla sempre node_modules: sul runner
          # self-hosted (persistente tra deploy) lo eseguiamo solo se
          # package-lock.json è cambiato dall'ultima volta, stesso pattern
          # usato per il volume node_modules in docker-entrypoint.sh.
          LOCK_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
          LOCK_MARKER=".node_modules_hash"
          if [ ! -d node_modules ] || [ "$(cat "$LOCK_MARKER" 2>/dev/null)" != "$LOCK_HASH" ]; then
            npm ci
            echo "$LOCK_HASH" > "$LOCK_MARKER"
          else
            echo "package-lock.json invariato, skip npm ci."
          fi
          # Niente --with-deps: le dipendenze di sistema sono già sul runner
          # (installate dai deploy precedenti); 'install' scarica il browser
          # solo se la versione richiesta manca da ~/.cache/ms-playwright.
          npx playwright install chromium
          npx playwright test
