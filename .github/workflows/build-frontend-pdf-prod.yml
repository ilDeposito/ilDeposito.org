name: Build Frontend PDF (Prod)

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Origine del trigger (impostata automaticamente da Drupal quando parte dal pulsante "Pubblica")'
        required: false
        default: 'GitHub'

concurrency:
  group: build-frontend-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/sergej/websites/ildeposito/prod

    steps:
      - name: Build frontend (solo pdf, in-place sulla release corrente)
        run: ./ildeposito.sh build-frontend-pdf --source "${{ inputs.source }}"
