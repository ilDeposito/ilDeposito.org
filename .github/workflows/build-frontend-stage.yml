name: Build Frontend (Stage)

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Origine del trigger (impostata automaticamente da Drupal quando parte dal pulsante "Pubblica")'
        required: false
        default: 'GitHub'

concurrency:
  group: build-frontend-stage
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/sergej/websites/ildeposito/stage

    steps:
      - name: Build frontend
        run: ./ildeposito.sh build-frontend --source "${{ inputs.source }}"