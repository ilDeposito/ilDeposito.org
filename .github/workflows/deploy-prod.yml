name: Deploy Prod

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/sergej/websites/ildeposito/prod

    steps:
      - name: Pre-deploy health check
        run: |
          ./ildeposito.sh drush status --fields=drupal-version,db-status,bootstrap
          ./ildeposito.sh drush config:status 2>/dev/null \
            | grep -v 'No differences' \
            && echo '::warning::Config drift rilevato' || true

      - name: Backup database
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ./ildeposito.sh drush sql:dump --result-file=/var/backup_migrate/pre-deploy-${TIMESTAMP}.sql
          ./ildeposito.sh exec -T php bzip2 /var/backup_migrate/pre-deploy-${TIMESTAMP}.sql
          find backup/ -name "pre-deploy-*.sql.bz2" -mtime +7 -delete

      - name: Checkout tag
        run: |
          # Drupal (status report) può aver indurito sites/default a 555:
          # git reset deve poter fare unlink dei file dentro la directory.
          # Difesa in profondità oltre a skip_permissions_hardening nei settings.
          chmod u+w backend/web/sites/default backend/web/sites/default/*.php backend/web/sites/default/*.yml 2>/dev/null || true
          git fetch origin --tags --prune
          git reset --hard "tags/${{ github.ref_name }}"
          {
            git describe --tags --always
            git log -1 --pretty=%s
          } > backend/.deploy-version

      - name: Update containers
        run: ./ildeposito.sh up

      - name: Wait for DB ready
        run: |
          for i in $(seq 1 10); do
            ./ildeposito.sh drush status --fields=db-status 2>/dev/null \
              | grep -q Connected && break
            echo "Waiting for DB... ($i/10)"; sleep 5
          done

      - name: Install Composer dependencies
        run: ./ildeposito.sh composer install --no-dev --optimize-autoloader

      - name: Run Drupal updates
        run: |
          ./ildeposito.sh drush sset system.maintenance_mode 1
          ./ildeposito.sh drush cache:rebuild
          ./ildeposito.sh drush updatedb -y || { ./ildeposito.sh drush sset system.maintenance_mode 0; ./ildeposito.sh drush cache:rebuild; exit 1; }
          ./ildeposito.sh drush config:import -y || { ./ildeposito.sh drush sset system.maintenance_mode 0; ./ildeposito.sh drush cache:rebuild; exit 1; }
          ./ildeposito.sh drush cache:rebuild
          ./ildeposito.sh drush sset system.maintenance_mode 0
          ./ildeposito.sh drush cache:rebuild

      - name: Build frontend
        run: ./ildeposito.sh build-frontend

      - name: Smoke test
        run: |
          sleep 10
          # Letto da .env invece che hardcoded: FRONTEND_DOMAIN è temporaneamente
          # prod.ildeposito.org durante il cutover, diventerà www.ildeposito.org
          # al go-live pubblico, senza bisogno di ritoccare questo workflow.
          FRONTEND_DOMAIN=$(grep -m1 '^FRONTEND_DOMAIN=' .env | cut -d= -f2-)
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.PROD_FRONTEND_AUTH_USER }}:${{ secrets.PROD_FRONTEND_AUTH_PASS }}" \
            "https://${FRONTEND_DOMAIN}/")
          echo "HTTP status: $STATUS (dominio: ${FRONTEND_DOMAIN})"
          [ "$STATUS" = "200" ] || exit 1

      # E2E tests (Playwright) disabilitati temporaneamente: canto.spec.ts,
      # homepage.spec.ts e ricerca.spec.ts assumono la presenza di contenuti
      # (canti pubblicati) che in prod non ci sono ancora durante il cutover.
      # Riattivare dopo l'import dei contenuti / go-live.
      # - name: E2E tests (Playwright)
      #   env:
      #     # STAGE_AUTH_USER/PASS restano questi nomi perché è la variabile
      #     # letta da playwright.config.ts, non è specifica dell'ambiente stage.
      #     STAGE_AUTH_USER: ${{ secrets.PROD_FRONTEND_AUTH_USER }}
      #     STAGE_AUTH_PASS: ${{ secrets.PROD_FRONTEND_AUTH_PASS }}
      #   working-directory: /home/ubuntu/sergej/websites/ildeposito/prod/frontend
      #   run: |
      #     # playwright.config.ts punta a stage.ildeposito.org di default:
      #     # PLAYWRIGHT_BASE_URL è l'override, letto da .env invece che hardcoded
      #     # (FRONTEND_DOMAIN è temporaneamente prod.ildeposito.org durante il
      #     # cutover, diventerà www.ildeposito.org al go-live).
      #     export PLAYWRIGHT_BASE_URL="https://$(grep -m1 '^FRONTEND_DOMAIN=' ../.env | cut -d= -f2-)"
      #     # npm ci cancella e reinstalla sempre node_modules: sul runner
      #     # self-hosted (persistente tra deploy) lo eseguiamo solo se
      #     # package-lock.json è cambiato dall'ultima volta, stesso pattern
      #     # usato per il volume node_modules in docker-entrypoint.sh.
      #     LOCK_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
