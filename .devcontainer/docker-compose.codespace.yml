services:
  php:
    volumes:
      - ./:/var/www/html:cached
    environment:
      COMPOSER_MEMORY_LIMIT: "-1"

  nginx:
    ports:
      - "80:80"
    labels: {}
    networks:
      - internal

  mariadb:
    volumes:
      - mariadb-data:/var/lib/mysql

  crond:
    profiles:
      - donotstart

  solr:
    ports:
      - "8983:8983"

volumes:
  mariadb-data:

networks:
  caddy:
    external: false
    driver: bridge
