    - article [ref=e30]:
      - generic [ref=e32]: Fui soldato di Francisco Villa di quell’ uomo di fama immortale che anche se andava montando una sella non invidiava la poltrona presidenziale (*) Ora vivo laggiù sulla riva ricordando quel tempo immortale, ora vivo laggiù sulla riva ricordando Villa laggiù a Parral. Io fui uno di quei decorati che con il tempo divenne maggiore nella lotta restammo feriti difendendo patria ed onore. Oggi ricordo i tempi andati in cui combattemmo contro l’invasore, oggi ricordo i tempi andati di quei decorati di cui fui maggiore. Il cavallo che tante volte cavalcai a Jimenez raggiunse la morte, una pallottola destinata a me il suo corpo attraversò. Nitriva morendo dal dolore e per la patria dette la vita, nitriva morendo dal dolore quanto piansi quando morì. Pancho Villa ti porto impresso nella mia mente e nel mio cuore e anche se a volte mi vidi sconfitto dalle forze di Alvaro Obregón sempre fui fedele soldato fino alla fine della rivoluzione, sempre fui fedele soldato che tanto lottò vicino al cannone.
