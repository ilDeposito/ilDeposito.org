server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html/current/client;
    index index.html;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Cache dei metadati file (stat/open) — riduce le syscall per gli asset
    # statici hashati serviti ripetutamente (JS/CSS/font/immagini/PDF).
    open_file_cache max=2000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Security headers
    include /etc/nginx/conf.d/security-headers.conf;

    # Resolver Docker interno: risolve gli upstream a ogni richiesta
    # invece che al reload, evitando "host not found" se frontend-api non è ancora pronto.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Nginx riceve tutte le connessioni da Caddy (reverse proxy davanti), quindi
    # $remote_addr è sempre l'IP del container Caddy: senza questo, limit_req
    # aggrega TUTTI i visitatori sotto lo stesso IP invece di limitarli singolarmente.
    # Caddy imposta X-Forwarded-For automaticamente con l'IP reale del client.
    # ATTENZIONE — DA RESTRINGERE PRIMA DEL PROSSIMO DEPLOY:
    # 172.16.0.0/12 copre l'intero spazio che Docker usa per le reti bridge
    # custom, non solo la rete "caddy". Chiunque riesca a far girare un
    # container in quel /12 (es. un altro stack sullo stesso host, se la
    # rete "caddy" è condivisa) può falsificare X-Forwarded-For e bypassare
    # il rate limit per IP. Da restringere alla subnet reale, con:
    #   docker network inspect caddy --format '{{json .IPAM.Config}}'
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Rotte SSR → server Node Astro
    # ^~ obbligatorio: senza, la location regex per il redirect trailing-slash
    # (^(.+)/$ più sotto) avrebbe priorità su un prefisso semplice e
    # intercetterebbe una richiesta esatta a "/api/" con un 301 invece di
    # instradarla al backend Node.
    location ^~ /api/ {
        limit_req zone=api burst=8 nodelay;
        client_max_body_size 256k;
        set $ssr http://frontend-api:4321;
        proxy_pass $ssr;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Passa lo schema originale da Caddy (che termina SSL) al Node server.
        # Senza questo, Astro costruisce url.origin come "http://..." e checkOrigin fallisce.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 10s;
    }

    # Redirect trailing slash → senza slash (301). Assoluto: evita ambiguità
    # con path degeneri (es. slash multipli) che un Location relativo può
    # trasformare in redirect protocol-relative. Sempre dietro Caddy → https.
    location ~ ^(.+)/$ {
        return 301 https://$host$1;
    }

    # Pagefind: molte richieste parallele, no rate limit, no re-compression
    # ^~ impedisce ai file .js/.css di pagefind di matchare il regex location
    location ^~ /pagefind/ {
        try_files $uri =404;
        gzip off;
        brotli off;
        expires 7d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    location / {
        limit_req zone=html burst=20 nodelay;
        try_files $uri $uri/index.html $uri.html =404;
        # Deploy con release + symlink swap: revalidazione ad ogni richiesta
        # (via ETag/Last-Modified) invece di lasciare cache euristica del browser.
        # add_header qui azzera l'ereditarietà degli header del blocco server,
        # quindi reincludiamo security-headers.conf come nelle altre location.
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Asset statici Astro (hashed filenames) — cache aggressiva
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Immagini — cache lunga ma non immutable (possono cambiare)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # PDF generati per canto
    location /pdf/ {
        limit_req zone=pdf burst=10 nodelay;
        expires 7d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    error_page 404 /404.html;

    # Asset precompressi in build (.br/.gz accanto ai file, vedi
    # docker-entrypoint.sh): serviti as-is, zero CPU di compressione a runtime.
    # gzip/brotli on restano come fallback per ciò che non è precompresso.
    brotli_static on;
    gzip_static on;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/pdf
        image/svg+xml
        application/x-font-ttf
        font/opentype;

    # Brotli (richiede modulo ngx_brotli — incluso in macbre/nginx-brotli)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/pdf
        image/svg+xml
        application/x-font-ttf
        font/opentype;
}
