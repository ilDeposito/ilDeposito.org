server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html/current/client;
    index index.html;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Cache dei metadati file (stat/open) — riduce le syscall per gli asset
    # statici hashati serviti ripetutamente (JS/CSS/font/immagini/PDF).
    open_file_cache max=2000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Security headers
    include /etc/nginx/conf.d/security-headers.conf;

    # Resolver Docker interno: risolve gli upstream a ogni richiesta
    # invece che al reload, evitando "host not found" se frontend-api non è ancora pronto.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # real_ip (trusted proxy Caddy): configurato in /etc/nginx/conf.d/realip.conf,
    # generato all'avvio del container da nginx-realip.conf.template con la
    # subnet reale della rete "caddy" (env CADDY_TRUSTED_SUBNET, vedi compose).

    # Rotte SSR → server Node Astro
    # ^~ obbligatorio: senza, la location regex per il redirect trailing-slash
    # (^(.+)/$ più sotto) avrebbe priorità su un prefisso semplice e
    # intercetterebbe una richiesta esatta a "/api/" con un 301 invece di
    # instradarla al backend Node.
    location ^~ /api/ {
        limit_req zone=api burst=8 nodelay;
        client_max_body_size 256k;
        set $ssr http://frontend-api:4321;
        proxy_pass $ssr;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Passa lo schema originale da Caddy (che termina SSL) al Node server.
        # Senza questo, Astro costruisce url.origin come "http://..." e checkOrigin fallisce.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 10s;
    }

    # /canzonieri (src/pages/canzonieri/index.astro) è l'unica pagina SSR fuori
    # da /api/: legge manifest.json a ogni richiesta (vedi commento nel file),
    # quindi non può essere prerenderizzata. Senza questa location cade nel
    # blocco statico "location /" e non trova mai un file corrispondente → 404.
    location = /canzonieri {
        limit_req zone=html burst=20 nodelay;
        set $ssr http://frontend-api:4321;
        proxy_pass $ssr;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 10s;
    }

    # Redirect legacy generati a build time da Drupal (ildeposito_redirects),
    # vedi frontend/scripts/generate-redirects.mjs. Path assoluto: funziona a
    # prescindere da dove nella release si trovi il file (root punta a
    # current/client, questo file vive nella root della release).
    include /usr/share/nginx/html/current/_redirects.conf;

    # /ricerca?key=valore → /cerca?q=valore (vecchio motore di ricerca Drupal).
    location = /ricerca {
        if ($arg_key) { return 301 /cerca?q=$arg_key; }
        return 301 /cerca;
    }

    # Pattern legacy Drupal 8 riconoscibili → home. Regex, va PRIMA del blocco
    # trailing-slash qui sotto (anch'esso regex): tra location regex vince la
    # prima dichiarata nel file, non la più specifica. /rss.xml NON va incluso
    # qui: ha un endpoint nuovo e funzionante (src/pages/rss.xml.js).
    location ~ ^/(node|taxonomy/term|user|comment|admin|media)(/|$) {
        return 301 /;
    }
    location ~ ^/sites/default/files(/|$) {
        return 301 /;
    }

    # Redirect trailing slash → senza slash (301). Assoluto: evita ambiguità
    # con path degeneri (es. slash multipli) che un Location relativo può
    # trasformare in redirect protocol-relative. Sempre dietro Caddy → https.
    location ~ ^(.+)/$ {
        return 301 https://$host$1;
    }

    # pagefind.js e pagefind-entry.json hanno nome FISSO ma contenuto diverso
    # ad ogni build (l'entry.json referenzia l'hash dell'indice corrente). Se
    # il browser li cache per giorni, dopo un deploy prova a fetchare frammenti
    # hash-based della release precedente (che non esistono più) → 404 → errore
    # "Errore nel caricamento" nella lista canti. Vanno sempre rivalidati.
    location = /pagefind/pagefind.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }
    location = /pagefind/pagefind-entry.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Pagefind: molte richieste parallele, no rate limit, no re-compression
    # ^~ impedisce ai file .js/.css di pagefind di matchare il regex location
    # I file rimanenti qui sotto (fragment/*.pf_fragment, index/*.pf_index,
    # pagefind.<hash>.pf_meta) hanno l'hash del contenuto nel nome: cache lunga sicura.
    location ^~ /pagefind/ {
        try_files $uri =404;
        gzip off;
        brotli off;
        expires 7d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    location / {
        limit_req zone=html burst=20 nodelay;
        try_files $uri $uri/index.html $uri.html =404;
        # Deploy con release + symlink swap: revalidazione ad ogni richiesta
        # (via ETag/Last-Modified) invece di lasciare cache euristica del browser.
        # add_header qui azzera l'ereditarietà degli header del blocco server,
        # quindi reincludiamo security-headers.conf come nelle altre location.
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/conf.d/security-headers.conf;
        # "=404" esplicito, non il bare "=": con una location @named che usa
        # try_files per servire un file esistente, "=" da solo fa collassare
        # lo status a 200 invece di preservare 404 (verificato con nginx reale
        # — la combinazione named-location + try_files perde il codice che
        # "=" dovrebbe preservare; "=404" lo forza esplicitamente).
        error_page 404 =404 @log404;
    }

    # 404 reali (non intercettati dai redirect/pattern legacy sopra): loggati
    # su un file dedicato per il report periodico drush (vedi
    # ildeposito_redirects::Report404Command), poi serviti normalmente.
    location @log404 {
        access_log /var/log/nginx/404.log notfound;
        try_files /404.html =404;
    }

    # Asset statici Astro (hashed filenames) — cache aggressiva
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Immagini — cache lunga ma non immutable (possono cambiare)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # PDF generati per canto
    location /pdf/ {
        limit_req zone=pdf burst=10 nodelay;
        expires 7d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Asset precompressi in build (.br/.gz accanto ai file, vedi
    # docker-entrypoint.sh): serviti as-is, zero CPU di compressione a runtime.
    # gzip/brotli on restano come fallback per ciò che non è precompresso.
    brotli_static on;
    gzip_static on;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/pdf
        image/svg+xml
        application/x-font-ttf
        font/opentype;

    # Brotli (richiede modulo ngx_brotli — incluso in macbre/nginx-brotli)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/pdf
        image/svg+xml
        application/x-font-ttf
        font/opentype;
}
