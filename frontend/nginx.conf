server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html/current;
    index index.html;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Security headers
    include /etc/nginx/conf.d/security-headers.conf;

    # Redirect trailing slash → senza slash (301)
    location ~ ^(.+)/$ {
        return 301 $1;
    }

    # Pagefind: molte richieste parallele, no rate limit
    location /pagefind/ {
        try_files $uri =404;
        gzip off;
        brotli off;
        expires 7d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    location / {
        limit_req zone=html burst=20 nodelay;
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Asset statici Astro (hashed filenames) — cache aggressiva
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Immagini — cache lunga ma non immutable (possono cambiare)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # PDF generati per canto
    location /pdf/ {
        limit_req zone=pdf burst=10 nodelay;
        expires 7d;
        add_header Cache-Control "public" always;
        include /etc/nginx/conf.d/security-headers.conf;
    }

    error_page 404 /404.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/pdf
        image/svg+xml
        application/x-font-ttf
        font/opentype;

    # Brotli (richiede modulo ngx_brotli — incluso in macbre/nginx-brotli)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        image/svg+xml
        application/x-font-ttf
        font/opentype;
}
