# Basic auth ambiente stage — sostituisce caddy.basicauth (prima gestita da Caddy).
# File incluso solo in stage (montato come /etc/nginx/conf.d/auth.conf), assente
# in prod dove il frontend resta pubblico. Username "ildeposito" (letterale,
# come nella precedente label caddy.basicauth.ildeposito) + BASIC_AUTH_HASH da
# .env: stesse credenziali già in uso. L'htpasswd viene generato da
# ildeposito.sh all'avvio: vedi generate_htpasswd() in ildeposito.sh.
auth_basic "ilDeposito staging";
auth_basic_user_file /etc/nginx/.htpasswd;
