# ─────────────────────────────────────────────────────────────────────────────
#  SEO e testi di pagina — sorgente unica
# ─────────────────────────────────────────────────────────────────────────────
#
#  Ogni voce è una "chiave di pagina" che la pagina .astro richiama con
#  getPageMeta('chiave', { ...variabili }). Campi disponibili per ogni voce:
#
#    metaTitle        →  <title> nel <head>   (se assente eredita da pageTitle)
#    metaDescription  →  <meta description>    (se assente eredita da pageDescription)
#    pageTitle        →  titolo visibile in pagina (<h1>)
#    pageDescription  →  sottotitolo visibile sotto il titolo
#    noindex          →  true per escludere la pagina dai motori
#
#  Il suffisso "| ilDeposito.org" e il troncamento (53/155 caratteri) sono
#  applicati automaticamente da seo.js: qui scrivi sempre i titoli "nudi".
#
# ─────────────────────────────────────────────────────────────────────────────
#  SINTASSI DEI TEMPLATE (utile per le pagine dinamiche)
# ─────────────────────────────────────────────────────────────────────────────
#
#    {var}                interpola una variabile (stringa vuota se assente)
#    {?var}...{/var}      mostra il blocco SOLO se `var` è valorizzata
#    {^var}...{/var}      mostra il blocco SOLO se `var` è vuota (l'"altrimenti")
#    {count|canto|canti}  plurale: "canto" se count == 1, altrimenti "canti"
#
#  "vuota" = assente, stringa vuota, false oppure 0. I blocchi si possono
#  annidare. Esempi di titolo condizionale:
#
#    metaTitle: "{titolo} — Testo{?accordi} e accordi{/accordi}"
#      → "Bella ciao — Testo e accordi"   se accordi è valorizzata
#      → "Bella ciao — Testo"             altrimenti
#
#    metaDescription: "{?bio}{bio}{/bio}{^bio}Biografia di {titolo}.{/bio}"
#      → usa la bio se c'è, altrimenti genera una frase di ripiego
#
# ═════════════════════════════════════════════════════════════════════════════


# ─── Home ────────────────────────────────────────────────────────────────────
# La home ha un hero dedicato: pageDescription ne è il sottotitolo.
home:
  metaTitle: "ilDeposito.org — Canti di protesta e sociale"
  metaDescription: "Archivio online di canti di protesta politica e sociale: testi, accordi, traduzioni, autori e eventi storici."
  pageDescription: "Archivio online di canti di protesta politica e sociale. Testi, accordi, traduzioni, autori e gli eventi storici che li hanno ispirati."


# ─── Pagine di servizio ──────────────────────────────────────────────────────
contatti:
  metaTitle: "Contatti"
  metaDescription: "Scrivici per segnalazioni, collaborazioni o informazioni sull'archivio ilDeposito.org"
  pageTitle: "Contatti"
  pageDescription: "Scrivici per segnalazioni, collaborazioni o informazioni sull'archivio."

canzonieri:
  metaTitle: "Canzonieri"
  metaDescription: "Canzonieri PDF collettivi: tutti i canti, tutti i canti con accordi, per periodo e per autore."
