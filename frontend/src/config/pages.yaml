  noindex: true

cerca:
  metaTitle: "Cerca nell'archivio"
  metaDescription: "Cerca tra i canti, gli autori, gli eventi, le traduzioni e i periodi dell'archivio"
  pageTitle: "Cerca nell'archivio"
  noindex: true

notFound:
  metaTitle: "Pagina non trovata"
  metaDescription: "La pagina richiesta non esiste"
  pageTitle: "Pagina non trovata"
  pageDescription: "La pagina che stai cercando non esiste o è stata spostata"
