# ─── Canti ───────────────────────────────────────────────────────────────────
canti.index:
  metaTitle: "Canti di protesta — Elenco canti"
  metaDescription: "Esplora l'archivio completo dei canti di protesta politica e sociale: testi, accordi, traduzioni e informazioni storiche."
  pageTitle: "I canti de ilDeposito.org"
  pageDescription: "I canti più importanti e più visti"

canti.elenco:
  metaTitle: "Canti di protesta - L'archivio completo"
  metaDescription: "Tutti i canti dell'archivio in ordine alfabetico"
  pageTitle: "I canti dell'archivio"
  pageDescription: "L'elenco completo e navigabile dei canti dell'archivio"

# Pagina singolo canto — token: {titolo} {accordi} {autori} {primoAutoreTesto} {descrittore} {anno} {extra}
#   accordi:          valorizzata se il canto ha gli accordi
#   autori:           autori di testo e musica, già uniti ("Tizio e Caio")
#   primoAutoreTesto: solo il primo autore del testo — usato nel metaTitle per evitare troncamenti
#   descrittore:      "Testo" o "Testo e accordi" — calcolato in seo.js, omesso (stringa vuota)
#                     se titolo+autore+descrittore superano il limite SERP
#   anno:             anno del canto
#   extra:            capoverso o informazioni (frase di apertura)
canti.detail:
  metaTitle: "{titolo}{?primoAutoreTesto} — {primoAutoreTesto}{/primoAutoreTesto}{?descrittore} — {descrittore}{/descrittore}"
  metaDescription: "Testo{?accordi}, accordi{/accordi} di {titolo}{?autori} di {autori}{/autori}{?anno} ({anno}){/anno}.{?extra} {extra}{/extra}"


# ─── Autori ──────────────────────────────────────────────────────────────────
autori.index:
  metaTitle: "Gli autori dell'archivio"
  metaDescription: "Gli autori e compositori dei canti di protesta dell'archivio"
  pageTitle: "Gli autori più visti e importanti dell'archivio"
  pageDescription: "I compositori e autori dei canti"

autori.elenco:
  metaTitle: "Gli autori: elenco completo"
  metaDescription: "Elenco completo degli autori in ordine alfabetico"
  pageTitle: "Tutti gli autori dell'archivio"
  pageDescription: "L'elenco completo e navigabile degli autori presenti nell'archivio"

# Pagina singolo autore — token: {titolo} {bio} {count} {loc} {anni}
#   bio:   biografia (informazioni) se presente
#   count: numero di canti dell'autore nell'archivio
#   loc:   prima localizzazione (luogo d'origine)
#   anni:  anno di nascita-morte ("1920 - 1985"), o solo uno dei due se l'altro manca
autori.detail:
  metaTitle: "{titolo} — Canti e biografia"
  metaDescription: "{?bio}{?anni}{titolo} ({anni}). {/anni}{bio}{?count} {count} {count|canto|canti} nell'archivio.{/count}{/bio}{^bio}Biografia e canti di {titolo}{?anni} ({anni}){/anni}{?loc}, da {loc}{/loc}.{?count} {count} {count|canto|canti} con testo e accordi nell'archivio di ilDeposito.org.{/count}{^count} Nell'archivio di ilDeposito.org.{/count}{/bio}"

# Elenco completo canti di un autore (autori/[slug]/canti) — token: {titolo}
autori.canti:
  metaTitle: "Tutti i canti di {titolo}"
  metaDescription: "L'elenco completo dei canti di {titolo} presenti nell'archivio."


# ─── Eventi ──────────────────────────────────────────────────────────────────
eventi.index:
  metaTitle: "Gli eventi della Storia Cantata"
  metaDescription: "Gli eventi storici legati ai canti di protesta: date, luoghi e canti collegati nell'archivio di ilDeposito.org."
  pageTitle: "Gli eventi dell'archivio"
  pageDescription: "La dashboard degli eventi"

eventi.elenco:
  metaTitle: "Gli eventi dell'archivio - Elenco completo"
  metaDescription: "L'elenco completo degli eventi presenti nell'archivio"
  pageTitle: "Gli eventi dell'archivio"
  pageDescription: "L'elenco completo degli eventi presenti nell'archivio."

mappaCantata:
  metaTitle: "Mappa cantata — Gli eventi sulla mappa"
  metaDescription: "Tutti gli eventi storici legati ai canti di protesta geolocalizzati su mappa."
  pageTitle: "Mappa cantata"
  pageDescription: "Tutti gli eventi dell'archivio geolocalizzati su mappa"

# Pagina singolo evento — token: {titolo} {anno} {info} {data} {loc} {count}
#   anno:   anno dell'evento (per il titolo)
#   info:   informazioni (descrizione) se presenti
#   data:   data formattata ("5 marzo 1946")
#   loc:    prima localizzazione
#   count:  numero di canti collegati all'evento
eventi.detail:
  metaTitle: "{titolo}{?data} ({data}){/data}"
  metaDescription: "{?info}{info}{/info}{^info}{titolo}{?data}, {data}{/data}{?loc} — {loc}{/loc}. Evento storico nell'archivio di ilDeposito.org.{?count} {count} {count|canto collegato|canti collegati}.{/count}{/info}"


# ─── Traduzioni ──────────────────────────────────────────────────────────────
traduzioni.index:
  metaTitle: "Traduzioni dei canti — Archivio"
  metaDescription: "Le traduzioni dei canti di protesta in tutte le lingue: testi tradotti, lingue originali e versioni alternative."
  pageTitle: "Le traduzioni dell'archivio"
  pageDescription: "L'elenco completo delle traduzioni dell'archivio"

# Pagina singola traduzione — token: {titolo} {lingua} {info} {nome}
#   lingua: lingua della traduzione
#   info:   informazioni (descrizione) se presenti
#   nome:   titolo del canto originale (o della traduzione)
traduzioni.detail:
  metaTitle: "{titolo}{?lingua} — Traduzione in {lingua}{/lingua}"
  metaDescription: "{?info}{info}{/info}{^info}Traduzione{?lingua} in {lingua}{/lingua} di {nome}. Testo completo nell'archivio di ilDeposito.org.{/info}"


