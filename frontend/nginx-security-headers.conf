add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
# Content-Security-Policy: generata a build time da src/integrations/csp-hashes.js
# (hash sha256 degli script inline al posto di 'unsafe-inline' effettivo).
# Il glob non fallisce se il file non esiste ancora (primo avvio senza build);
# la reload post-swap di build-frontend fa rileggere il file della release.
include /usr/share/nginx/html/current/csp/*.conf;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-DNS-Prefetch-Control "off" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
