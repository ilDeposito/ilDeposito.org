limit_req_zone $binary_remote_addr zone=html:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=pdf:5m rate=5r/s;
# 2r/m era tarato per IP reale del client; senza real_ip era di fatto un
# limite globale per l'intero sito (vedi set_real_ip_from in nginx.conf).
# Alzato per non penalizzare invii legittimi (fetch ALTCHA + submit form).
limit_req_zone $binary_remote_addr zone=api:5m rate=20r/m;

# 503 di default non è semanticamente corretto per un rate limit.
limit_req_status 429;
