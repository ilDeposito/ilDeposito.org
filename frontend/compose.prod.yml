x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  astro-builder:
    container_name: ildeposito_prod_frontend_builder
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ENV: ${ENV}
      DRUPAL_API_URL: http://drupal-api:80
      # Cache PDF sul volume: sopravvive tra le build (il builder è usa-e-getta)
      PDF_CACHE_DIR: /app/output/.pdf-cache
    volumes:
      - frontend_output:/app/output
      - astro_cache:/app/.astro
    logging: *logging
    networks:
      - frontend-internal
      - app-internal
    profiles:
      - build

  frontend-api:
    container_name: ildeposito_prod_frontend_api
    # Digest pinnato: un pull non può cambiare l'immagine sotto i piedi.
    # Aggiornare con: docker manifest inspect node:22-alpine (o Docker Hub).
    image: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    restart: unless-stopped
    user: node
    command: >
      sh -c "
        until [ -f /app/output/current/server/entry.mjs ]; do
          echo 'Waiting for frontend build...'; sleep 3;
        done &&
        exec node /app/output/current/server/entry.mjs
      "
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      DRUPAL_API_URL: http://drupal-api:80
      DRUPAL_API_USER: ${DRUPAL_API_USER}
      DRUPAL_API_PASS: ${DRUPAL_API_PASS}
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY}
    volumes:
      - frontend_output:/app/output:ro
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      # /api/altcha è una rotta SSR reale: fallisce se Node è morto o se
      # ALTCHA_HMAC_KEY manca (500) — GET / risponderebbe 404 sempre.
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:4321/api/altcha || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *logging
    labels:
      autoheal: "true"
    networks:
      - frontend-internal
      - app-internal

  frontend-web:
    container_name: ildeposito_prod_frontend_nginx
    image: macbre/nginx-brotli@sha256:c21d7b2a59c4e802b5511654b487855b40e32c4e28d6816b69e58fabf4a59281
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1.0
    environment:
      # Subnet della rete docker "caddy": unico trusted proxy per X-Forwarded-For
      # (real_ip → rate limit per IP reale). Vedi nginx-realip.conf.template.
      CADDY_TRUSTED_SUBNET: ${CADDY_TRUSTED_SUBNET:?definire CADDY_TRUSTED_SUBNET in .env, vedi .env.example}
    # L'immagine non ha /docker-entrypoint.d (template envsubst dell'immagine
    # nginx ufficiale): genera realip.conf all'avvio, poi il CMD originale.
    command: >
      sh -c "envsubst '$$CADDY_TRUSTED_SUBNET'
      < /etc/nginx/templates/realip.conf.template
      > /etc/nginx/conf.d/realip.conf
      && exec nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - frontend_output:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ./nginx-security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
      - ./nginx-realip.conf.template:/etc/nginx/templates/realip.conf.template:ro
    logging: *logging
    labels:
      autoheal: "true"
      # In prod il frontend è pubblico: nessuna basic auth.
      caddy: ${FRONTEND_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      caddy_1: ildeposito.org
      caddy_1.redir: "https://${FRONTEND_DOMAIN}{uri} permanent"
    networks:
      - frontend-internal
      - caddy

volumes:
  frontend_output:
  astro_cache:

networks:
  frontend-internal:
    driver: bridge
  caddy:
    external: true
  app-internal:
    name: ildeposito-${ENV}-internal
    external: true
