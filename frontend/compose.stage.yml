services:
  astro-builder:
    container_name: ildeposito_stage_frontend_builder
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DRUPAL_API_URL: http://drupal-api:80
    volumes:
      - frontend_output:/app/output
      - astro_cache:/app/.astro
    networks:
      - frontend-internal
      - app-internal
    profiles:
      - build

  frontend-api:
    container_name: ildeposito_stage_frontend_api
    image: node:22-alpine
    restart: unless-stopped
    command: >
      sh -c "
        until [ -f /app/output/current/server/entry.mjs ]; do
          echo 'Waiting for frontend build...'; sleep 3;
        done &&
        exec node /app/output/current/server/entry.mjs
      "
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      DRUPAL_API_URL: http://drupal-api:80
      DRUPAL_API_USER: ${DRUPAL_API_USER}
      DRUPAL_API_PASS: ${DRUPAL_API_PASS}
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY}
    volumes:
      - frontend_output:/app/output:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:4321/ 2>&1; true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - frontend-internal
      - app-internal

  frontend-web:
    container_name: ildeposito_stage_frontend_nginx
    image: macbre/nginx-brotli@sha256:c21d7b2a59c4e802b5511654b487855b40e32c4e28d6816b69e58fabf4a59281
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - frontend_output:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ./nginx-security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
      - ./nginx-auth.conf:/etc/nginx/conf.d/auth.conf:ro
      - ../secrets/htpasswd:/etc/nginx/.htpasswd:ro
    labels:
      caddy: stage.ildeposito.org
      caddy.reverse_proxy: "{{upstreams 80}}"
    networks:
      - frontend-internal
      - caddy

volumes:
  frontend_output:
  astro_cache:

networks:
  frontend-internal:
    driver: bridge
  caddy:
    external: true
  app-internal:
    name: ildeposito-${ENV}-internal
    external: true
