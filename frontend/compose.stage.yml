services:
  astro-builder:
    container_name: ildeposito_stage_frontend_builder
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DRUPAL_API_URL: http://drupal-api:80
    volumes:
      - frontend_output:/app/output
    networks:
      - internal
      - app-internal
    profiles:
      - build

  frontend-web:
    container_name: ildeposito_stage_frontend_nginx
    image: macbre/nginx-brotli:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - frontend_output:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ./nginx-security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
    labels:
      caddy: stage.ildeposito.org
      caddy.basicauth: "/*"
      caddy.basicauth.ildeposito: "${BASIC_AUTH_HASH}"
      caddy.reverse_proxy: "{{upstreams 80}}"
    networks:
      - caddy

volumes:
  frontend_output:

networks:
  internal:
    driver: bridge
  caddy:
    external: true
  app-internal:
    name: ildeposito-${ENV}-internal
    external: true
