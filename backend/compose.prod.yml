services:
  mariadb:
    container_name: ildeposito_prod_backend_mariadb

  php:
    container_name: ildeposito_prod_backend_php
    environment:
      ILDEPOSITO_ENV: prod

  crond:
    container_name: ildeposito_prod_backend_crond

  redis:
    container_name: ildeposito_prod_backend_redis

  nginx:
    container_name: ildeposito_prod_backend_nginx
    # Alias esplicito e univoco sulla rete condivisa "caddy" — usato nelle
    # route sotto AL POSTO di {{upstreams 80}}. Causa reale del 400
    # "trusted_host_patterns" intermittente: {{upstreams 80}} fa risolvere
    # l'IP UNA VOLTA a caddy-docker-proxy e lo congela nella config di Caddy;
    # con container ricreati di frequente (deploy), Docker riassegna quell'IP
    # a un ALTRO container (anche di un progetto diverso, es. stage) prima
    # che Caddy rigeneri la route, e le richieste finiscono sul backend
    # sbagliato — che risponde comunque un 400 Drupal genuino, solo del sito
    # sbagliato. Puntare a questo hostname invece dell'IP fa risolvere il DNS
    # (sempre aggiornato) ad ogni connessione, non una volta sola.
    networks:
      caddy:
        aliases:
          - ildeposito-prod-nginx
    labels:
      caddy: admin.ildeposito.org
      # Access log per-richiesta (status, upstream, durata) — assente finora:
      # senza, Caddy logga solo eventi anomali (es. connessioni abortite),
      # non lo status code di ogni richiesta. @todo DEBUG TEMPORANEO per il
      # bug "trusted_host_patterns" intermittente, valutare se tenerlo anche
      # a regime una volta chiuso.
      caddy.log: ""
      caddy.route.0_request_header: "-Remote-User"
      caddy.route.1_request_header: "-Remote-Groups"
      caddy.route.2_request_header: "-Remote-Email"
      caddy.route.3_@public_path.path: /jsonapi* /sites/default/files*
      caddy.route.4_reverse_proxy: "@public_path ildeposito-prod-nginx:80"
      caddy.route.4_reverse_proxy.transport: http
      caddy.route.4_reverse_proxy.transport.keepalive: "off"
      caddy.route.5_forward_auth: authelia:9091
      caddy.route.5_forward_auth.uri: /api/authz/forward-auth
      caddy.route.5_forward_auth.copy_headers: Remote-User Remote-Groups Remote-Email
      caddy.route.6_reverse_proxy: "ildeposito-prod-nginx:80"
      caddy.route.6_reverse_proxy.transport: http
      caddy.route.6_reverse_proxy.transport.keepalive: "off"
