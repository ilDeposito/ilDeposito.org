services:
  mariadb:
    container_name: ildeposito_prod_backend_mariadb

  php:
    container_name: ildeposito_prod_backend_php
    environment:
      ILDEPOSITO_ENV: prod

  crond:
    container_name: ildeposito_prod_backend_crond

  redis:
    container_name: ildeposito_prod_backend_redis

  nginx:
    container_name: ildeposito_prod_backend_nginx
    # Alias esplicito e univoco sulla rete condivisa "caddy": senza, Compose
    # usa di default il nome del servizio ("nginx") come alias — e siccome
    # TUTTI gli stack Wodby (di qualunque cliente su questo host, es. asel_*)
    # chiamano il servizio nginx allo stesso modo, sulla rete esterna
    # condivisa il DNS interno di Docker risolve "nginx" a PIÙ IP diversi.
    # Risultato osservato: richieste per admin.ildeposito.org instradate a
    # caso verso il container nginx di un altro cliente, che risponde 400
    # "trusted_host_patterns" perché admin.ildeposito.org non è nel SUO
    # settings.php — indistinguibile da un bug nostro finché non si ispeziona
    # la rete Docker (vedi `docker inspect ... NetworkSettings.Networks`).
    networks:
      caddy:
        aliases:
          - ildeposito-prod-nginx
    labels:
      caddy: admin.ildeposito.org
      # Access log per-richiesta (status, upstream, durata) — assente finora:
      # senza, Caddy logga solo eventi anomali (es. connessioni abortite),
      # non lo status code di ogni richiesta. @todo DEBUG TEMPORANEO per il
      # bug "trusted_host_patterns" intermittente, valutare se tenerlo anche
      # a regime una volta chiuso.
      caddy.log: ""
      # @todo DEBUG TEMPORANEO — forward_auth/Authelia e basic auth rimossi
      # per isolare la causa del 400 "trusted_host_patterns" intermittente:
      # nessun'altra pista (reverse_proxy_trusted_headers, opcache, alias di
      # rete condivisa, keepalive Caddy->nginx) ha risolto. Il pannello resta
      # comunque dietro il login nativo Drupal (AnonymousLoginRedirect +
      # form utente/password), solo senza il livello Caddy/Authelia davanti.
      # Ripristinare la route forward_auth (vedi backend/compose.stage.yml
      # per la versione ancora attiva) una volta chiuso il bug.
      caddy.reverse_proxy: "{{upstreams 80}}"
      caddy.reverse_proxy.transport: http
      caddy.reverse_proxy.transport.keepalive: "off"
