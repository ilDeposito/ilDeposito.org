services:
  mariadb:
    container_name: ildeposito_prod_backend_mariadb

  php:
    container_name: ildeposito_prod_backend_php
    environment:
      ILDEPOSITO_ENV: prod

  crond:
    container_name: ildeposito_prod_backend_crond

  redis:
    container_name: ildeposito_prod_backend_redis

  nginx:
    container_name: ildeposito_prod_backend_nginx
    labels:
      caddy: admin.ildeposito.org
      # Access log per-richiesta (status, upstream, durata) — assente finora:
      # senza, Caddy logga solo eventi anomali (es. connessioni abortite),
      # non lo status code di ogni richiesta. @todo DEBUG TEMPORANEO per il
      # bug "trusted_host_patterns" intermittente, valutare se tenerlo anche
      # a regime una volta chiuso.
      caddy.log: ""
      caddy.route.0_request_header: "-Remote-User"
      caddy.route.1_request_header: "-Remote-Groups"
      caddy.route.2_request_header: "-Remote-Email"
      caddy.route.3_@public_path.path: /jsonapi* /sites/default/files*
      caddy.route.4_reverse_proxy: "@public_path {{upstreams 80}}"
      caddy.route.5_forward_auth: authelia:9091
      caddy.route.5_forward_auth.uri: /api/authz/forward-auth
      caddy.route.5_forward_auth.copy_headers: Remote-User Remote-Groups Remote-Email
      caddy.route.6_reverse_proxy: "{{upstreams 80}}"
      # Caddy valida la basic auth ma NON deve inoltrare l'header ad HTTP:
      # il modulo basic_auth di Drupal lo interpreterebbe come login → 403.
      # caddy.reverse_proxy.header_up: "-Authorization"
