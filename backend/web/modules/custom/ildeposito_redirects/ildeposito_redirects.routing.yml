ildeposito_redirects.form:
  path: '/admin/config/search/redirects'
  defaults:
    _form: '\Drupal\ildeposito_redirects\Form\RedirectsForm'
    _title: 'Gestione redirect'
  requirements:
    _permission: 'administer ildeposito redirects'

ildeposito_redirects.report404:
  path: '/admin/config/search/redirects/report-404'
  defaults:
    _form: '\Drupal\ildeposito_redirects\Form\Report404Form'
    _title: 'Report 404'
  requirements:
    _permission: 'administer ildeposito redirects'

ildeposito_redirects.report404_elimina_selezionati:
  path: '/admin/config/search/redirects/report-404/elimina-selezionati'
  defaults:
    _form: '\Drupal\ildeposito_redirects\Form\Report404EliminaSelezionatiForm'
    _title: 'Elimina URL selezionate'
  requirements:
    _permission: 'administer ildeposito redirects'

ildeposito_redirects.report404_azzera:
  path: '/admin/config/search/redirects/report-404/azzera'
  defaults:
    _form: '\Drupal\ildeposito_redirects\Form\Report404AzzeraForm'
    _title: 'Azzera log 404'
  requirements:
    _permission: 'administer ildeposito redirects'

ildeposito_redirects.api:
  path: '/api/redirects.json'
  defaults:
    _controller: '\Drupal\ildeposito_redirects\Controller\RedirectsApiController::list'
  requirements:
    _access: 'TRUE'
  methods: [GET]
