services:
  ildeposito_utils.commands:
    class: Drupal\ildeposito_utils\Commands\IldepositoUtilsCommands
    arguments:
      - '@entity_type.manager'
      - '@file_system'
      - '@extension.list.module'
    tags:
      - { name: drush.command }

  ildeposito_utils.twig.alias_lang_extension:
    class: Drupal\ildeposito_utils\Twig\AliasLangExtension
    arguments:
      - '@path_alias.manager'
      - '@language_manager'
      - '@entity_type.manager'
    tags:
      - { name: twig.extension }