services:
  mariadb:
    container_name: ildeposito_stage_backend_mariadb

  php:
    container_name: ildeposito_stage_backend_php
    # Causa reale del 400 "trusted_host_patterns" intermittente — vedi
    # commento gemello in compose.prod.yml: alias "php" duplicato con
    # l'ambiente gemello sulla rete condivisa "caddy", nginx può risolverlo
    # ambiguamente e inoltrare a un PHP-FPM dell'altro ambiente.
    networks:
      caddy:
        aliases:
          - ildeposito-stage-php
    environment:
      ILDEPOSITO_ENV: stage

  crond:
    container_name: ildeposito_stage_backend_crond

  redis:
    container_name: ildeposito_stage_backend_redis

  nginx:
    container_name: ildeposito_stage_backend_nginx
    # Alias esplicito e univoco sulla rete condivisa "caddy" — usato nelle
    # route sotto AL POSTO di {{upstreams 80}}, vedi commento gemello in
    # compose.prod.yml per il perché (IP congelato da caddy-docker-proxy che
    # Docker può riassegnare a un container diverso, es. prod, ai deploy
    # successivi — causa reale del 400 "trusted_host_patterns" intermittente).
    networks:
      caddy:
        aliases:
          - ildeposito-stage-nginx
    environment:
      # Vedi commento gemello in compose.prod.yml.
      NGINX_BACKEND_HOST: ildeposito-stage-php
    labels:
      caddy: admin-stage.ildeposito.org
      caddy.route.0_request_header: "-Remote-User"
      caddy.route.1_request_header: "-Remote-Groups"
      caddy.route.2_request_header: "-Remote-Email"
      caddy.route.3_@public_path.path: /jsonapi* /sites/default/files*
      caddy.route.4_reverse_proxy: "@public_path ildeposito-stage-nginx:80"
      caddy.route.4_reverse_proxy.transport: http
      caddy.route.4_reverse_proxy.transport.keepalive: "off"
      caddy.route.5_forward_auth: authelia:9091
      caddy.route.5_forward_auth.uri: /api/authz/forward-auth
      caddy.route.5_forward_auth.copy_headers: Remote-User Remote-Groups Remote-Email
      caddy.route.6_reverse_proxy: "ildeposito-stage-nginx:80"
      caddy.route.6_reverse_proxy.transport: http
      caddy.route.6_reverse_proxy.transport.keepalive: "off"
      # Caddy valida la basic auth ma NON deve inoltrare l'header ad HTTP:
      # il modulo basic_auth di Drupal lo interpreterebbe come login → 403.
      # caddy.reverse_proxy.header_up: "-Authorization"
