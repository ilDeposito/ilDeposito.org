#    - "traefik.http.routers.${PROJECT_NAME}_varnish.rule=Host(`varnish.${PROJECT_BASE_URL}`)"

  memcached:
    container_name: ildeposito_prod_memcached
    restart: unless-stopped
    image: wodby/memcached:$MEMCACHED_TAG
    networks:
      - internal  

networks:
  internal:
    driver: bridge
  caddy:
    external: true