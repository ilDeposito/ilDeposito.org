x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mariadb:
    image: wodby/mariadb:$MARIADB_TAG
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *logging
    mem_limit: 1g
    environment:
      MYSQL_ROOT_PASSWORD: $DB_ROOT_PASSWORD
      MYSQL_DATABASE: $DB_NAME
      MYSQL_USER: $DB_USER
      MYSQL_PASSWORD: $DB_PASSWORD
      MYSQL_TRANSACTION_ISOLATION: READ-COMMITTED
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      autoheal: "true"
    networks:
      - backend-internal

  php:
    image: wodby/drupal-php:$PHP_TAG
    restart: unless-stopped
    logging: *logging
    mem_limit: 1g
    healthcheck:
      # cgi-fcgi contro un file inesistente: FPM risponde comunque (404 CGI),
      # quindi l'exit code segnala solo se il master/worker FPM è raggiungibile
      # su 127.0.0.1:9000, non lo stato applicativo di Drupal.
      test: ["CMD-SHELL", "SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      autoheal: "true"
    environment:
      PHP_EXTENSIONS_DISABLE: xhprof,spx
      PHP_MAIL_MIXED_LF_AND_CRLF: On
      PHP_APCU_SHM_SIZE: 64M
      PHP_SESSION_COOKIE_SAMESITE: Strict
      DB_NAME: $DB_NAME
      DB_USER: $DB_USER
      DB_PASSWORD: $DB_PASSWORD
      DB_HOST: $DB_HOST
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      UMAMI_API_URL: ${UMAMI_API_URL:-}
      UMAMI_USERNAME: ${UMAMI_USERNAME:-}
      UMAMI_PASSWORD: ${UMAMI_PASSWORD:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      FBPOST_WEBHOOK_URL: ${FBPOST_WEBHOOK_URL:-}
      OPENID_CONNECT_AUTHELIA_CLIENT_ID: ${OPENID_CONNECT_AUTHELIA_CLIENT_ID:-}
      OPENID_CONNECT_AUTHELIA_CLIENT_SECRET: ${OPENID_CONNECT_AUTHELIA_CLIENT_SECRET:-}
      REDIS_HOST: redis
      PHP_FPM_CLEAR_ENV: "no"
    volumes:
    - ./:/var/www/html:cached
    - ../backup:/var/backup_migrate
    # Read-write (non :ro): la pagina admin "Report 404" (Report404AzzeraForm)
    # tronca il log su richiesta (copytruncate, sicuro con nginx che scrive in
    # append — vedi frontend/nginx.conf, location @log404).
    - ildeposito_404_log:/var/log/frontend-nginx
    networks:
      - backend-internal

  crond:
    init: true
    image: wodby/drupal-php:$PHP_TAG
    restart: unless-stopped
    logging: *logging
    mem_limit: 512m
    environment:
      DB_NAME: $DB_NAME
      DB_USER: $DB_USER
      DB_PASSWORD: $DB_PASSWORD
      DB_HOST: $DB_HOST
      REDIS_HOST: redis
      # Scheduling spostato sul crontab della macchina (coordina meglio i job
      # cross-stack, es. gli orari sfalsati dei backup stage/prod sullo
      # stesso host). Il servizio resta attivo/pronto per un uso futuro.
      CRONTAB: ""
    command: sudo -E crond -f -d 0
    volumes:
      - ./:/var/www/html:cached
      - ildeposito_404_log:/var/log/frontend-nginx
    networks:
      - backend-internal

  redis:
    image: wodby/redis:$REDIS_TAG
    restart: unless-stopped
    logging: *logging
    mem_limit: 320m
    environment:
      # Solo cache: niente volume, un restart costa solo cache fredda.
      REDIS_MAXMEMORY: 256mb
      REDIS_MAXMEMORY_POLICY: allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      autoheal: "true"
    networks:
      - backend-internal

  nginx:
    image: wodby/nginx:$NGINX_TAG
    restart: unless-stopped
    logging: *logging
    mem_limit: 128m
    depends_on:
      - php
    environment:
      NGINX_BACKEND_HOST: php
      NGINX_SERVER_ROOT: /var/www/html/web
      NGINX_VHOST_PRESET: $NGINX_VHOST_PRESET
      # Senza questo, fastcgi.conf passa a PHP $remote_addr = IP di Caddy
      # (l'unico hop che nginx vede), non quello del client reale: XFF non
      # viene mai inoltrato a PHP-FPM (fastcgi_pass, a differenza di
      # proxy_pass, non propaga gli header automaticamente). Stesso range
      # già fidato lato Drupal in settings.remote.php (reverse_proxy_addresses).
      NGINX_SET_REAL_IP_FROM: 172.16.0.0/12
      NGINX_REAL_IP_HEADER: X-Forwarded-For
      NGINX_REAL_IP_RECURSIVE: "on"
    healthcheck:
      # /jsonapi invece di /: questo backend è headless, "/" dipende dalla
      # Frontpage view legata a system.site:page.front (/node) che su questo
      # sito non è mantenuta e può restituire 404 anche a stack sano,
      # facendo fallire l'healthcheck e riavviare nginx da autoheal (anche a
      # metà di una build frontend in corso). /jsonapi è l'endpoint che
      # conta davvero (è quello che il builder Astro consuma).
      # Host esplicito: senza, wget manda "Host: 127.0.0.1", assente da
      # trusted_host_patterns (settings.php) → Drupal risponderebbe 400.
      test: ["CMD-SHELL", "wget -qO /dev/null --header='Host: localhost' http://127.0.0.1/jsonapi || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      autoheal: "true"
    volumes:
    - ./:/var/www/html:cached
    networks:
      backend-internal:
      caddy:
      app-internal:
        aliases:
          - drupal-api

volumes:
  mariadb_data:
  ildeposito_404_log:
    name: ildeposito-${ENV}-404-log
    external: true

networks:
  backend-internal:
    driver: bridge
  caddy:
    external: true
  app-internal:
    name: ildeposito-${ENV}-internal
    external: true